<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- 手書きで疲れているイラスト -->
  <symbol id="handwriting-illustration" viewBox="0 0 200 200">
    <rect x="40" y="80" width="120" height="80" fill="#E0E5EA" stroke="#6C757D" stroke-width="2" rx="5"/>
    <line x1="50" y1="100" x2="150" y2="100" stroke="#6C757D" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="120" x2="140" y2="120" stroke="#6C757D" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="140" x2="130" y2="140" stroke="#6C757D" stroke-width="1" opacity="0.5"/>
    <path d="M120 130 L125 170 L130 165" fill="none" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/>
    <circle cx="125" cy="50" r="20" fill="#FFE4B5"/>
    <path d="M115 45 Q125 50 135 45" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <circle cx="118" cy="45" r="2" fill="#2C3E50"/>
    <circle cx="132" cy="45" r="2" fill="#2C3E50"/>
    <path d="M120 55 Q125 60 130 55" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" transform="rotate(180 125 57)"/>
    <text x="100" y="190" font-family="Arial" font-size="12" fill="#6C757D" text-anchor="middle">手書きで大変...</text>
  </symbol>

  <!-- スマホでタップするイラスト -->
  <symbol id="smartphone-tap-illustration" viewBox="0 0 200 200">
    <rect x="60" y="40" width="80" height="140" fill="#1a1a1a" rx="10"/>
    <rect x="65" y="50" width="70" height="120" fill="#FFFFFF" rx="5"/>
    <circle cx="100" cy="100" r="25" fill="#2E86AB" opacity="0.2">
      <animate attributeName="r" values="25;30;25" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.1;0.2" dur="1s" repeatCount="indefinite"/>
    </circle>
    <rect x="80" y="80" width="40" height="15" fill="#2E86AB" rx="5"/>
    <rect x="80" y="105" width="40" height="15" fill="#5EB670" rx="5"/>
    <path d="M130 120 L145 130 L142 133 L140 135 L125 125" fill="#FFE4B5"/>
    <circle cx="125" cy="30" r="20" fill="#FFE4B5"/>
    <path d="M115 25 Q125 30 135 25" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <circle cx="118" cy="25" r="2" fill="#2C3E50"/>
    <circle cx="132" cy="25" r="2" fill="#2C3E50"/>
    <path d="M118 35 Q125 40 132 35" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
    <text x="100" y="190" font-family="Arial" font-size="12" fill="#5EB670" text-anchor="middle">タップで簡単！</text>
  </symbol>

  <!-- 簡単3ステップアイコン -->
  <symbol id="step-icons" viewBox="0 0 600 200">
    <!-- ステップ1 -->
    <g transform="translate(0, 0)">
      <circle cx="100" cy="100" r="80" fill="#E8F4F8" stroke="#2E86AB" stroke-width="3"/>
      <rect x="70" y="60" width="60" height="100" fill="#6C757D" rx="10"/>
      <rect x="75" y="70" width="50" height="80" fill="#FFFFFF" rx="5"/>
      <text x="100" y="110" font-family="Arial" font-size="40" fill="#2E86AB" text-anchor="middle">📱</text>
    </g>
    <!-- ステップ2 -->
    <g transform="translate(200, 0)">
      <circle cx="100" cy="100" r="80" fill="#E8F4F8" stroke="#2E86AB" stroke-width="3"/>
      <text x="100" y="120" font-family="Arial" font-size="60" fill="#FFD700" text-anchor="middle">⚡</text>
    </g>
    <!-- ステップ3 -->
    <g transform="translate(400, 0)">
      <circle cx="100" cy="100" r="80" fill="#E8F4F8" stroke="#5EB670" stroke-width="3"/>
      <text x="100" y="120" font-family="Arial" font-size="60" fill="#5EB670" text-anchor="middle">✨</text>
    </g>
  </symbol>
</svg>